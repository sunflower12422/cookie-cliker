<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 КУКИ КЛИКЕР - СЛИВКИ ШОУ v1.5</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/doorGame.css">
</head>
<body class="stage-0">
    <div class="version">v1.5 🎮 СЕКРЕТЫ</div>

    <!-- Угловой элемент (правый нижний угол) -->
    <div class="corner-item" id="cornerItem">
        <img id="cornerImg" src="assets/images/sunflower.png" alt="" style="width: 32px; height: 32px;">
    </div>

    <div class="game-container">
        <div class="currency-header">
            <div class="currency-label">🍪 КУКИ НА СКЛАДЕ</div>
            <div class="currency-amount" id="cookieAmount">0</div>
        </div>

        <div class="stats">
            <div>🐱 КОТ КУКИ: <span id="clickPower">1</span> 🍪</div>
            <div>🏆 ЭТАП: <span id="stage">0</span>/5</div>
        </div>

        <div class="cat-container">
            <div class="speech-bubble" id="speechBubble">КУКИИИ!</div>
            <div class="cat" id="cat"></div>
        </div>

        <div class="cat-phrase" id="catPhrase">КЛИКНИ МЕНЯ!</div>

        <div class="progress-section">
            <div class="progress-label">
                <span id="nextStageName">😺 1 КУКИ</span>
                <span id="nextStagePrice">500</span> 🍪
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
        </div>

        <button class="achievements-btn" id="achievementsBtn">🏆 ACHIEVEMENTS</button>

        <div class="shop">
            <h2>🏪 МАГАЗИН КУКИ</h2>
            <div class="upgrades">
                <div class="upgrade-item" onclick="buyUpgrade('clickPower')">
                    <div class="upgrade-icon">⚡</div>
                    <div class="upgrade-name">КОТ-УДАР</div>
                    <div class="upgrade-desc">+1 🍪 за клик</div>
                    <div class="upgrade-price" id="clickPowerPrice">50 🍪</div>
                    <div class="upgrade-level" id="clickPowerLevel">Ур. 1</div>
                </div>
                
                <div class="upgrade-item" onclick="buyUpgrade('autoClicker')">
                    <div class="upgrade-icon">🐈</div>
                    <div class="upgrade-name">КОТ-ПОМОЩНИК</div>
                    <div class="upgrade-desc">+1 🍪/сек</div>
                    <div class="upgrade-price" id="autoClickerPrice">100 🍪</div>
                    <div class="upgrade-level" id="autoClickerLevel">Ур. 0</div>
                </div>
            </div>
        </div>

        <button class="donate-btn" onclick="donate()">💸 ДОНАТ 10К КУКИ</button>
        <button class="reset-btn" onclick="resetGame()">🔄 НАЧАТЬ СНАЧАЛА</button>
    </div>

    <script src="js/script.js"></script>
    <script src="js/doorGame.js"></script>
</body>
</html>
